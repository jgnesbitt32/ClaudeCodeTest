<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 24px;
    }

    h1 {
      font-size: 2rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #e0e0ff;
    }

    #status {
      font-size: 1.1rem;
      color: #a0a0cc;
      height: 1.5em;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 100px);
      grid-template-rows: repeat(3, 100px);
      gap: 8px;
    }

    .cell {
      background: #16213e;
      border: 2px solid #0f3460;
      border-radius: 12px;
      font-size: 2.8rem;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.04);
    }

    .cell.x { color: #e94560; }
    .cell.o { color: #53c8e8; }

    .cell.win {
      background: #0f3460;
      border-color: #e2c96e;
      animation: pulse 0.5s ease;
    }

    @keyframes pulse {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.1); }
      100% { transform: scale(1); }
    }

    #scores {
      display: flex;
      gap: 40px;
      font-size: 1rem;
    }

    .score-box {
      text-align: center;
    }

    .score-box .label {
      color: #888;
      font-size: 0.75rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .score-box .val {
      font-size: 1.8rem;
      font-weight: bold;
    }

    #x-score .val { color: #e94560; }
    #o-score .val { color: #53c8e8; }
    #draw-score .val { color: #aaa; }

    #reset {
      padding: 10px 30px;
      background: #0f3460;
      color: #eee;
      border: 2px solid #1a5276;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      letter-spacing: 1px;
      transition: background 0.15s;
    }

    #reset:hover { background: #1a5276; }
  </style>
</head>
<body>

  <h1>Tic Tac Toe</h1>

  <div id="scores">
    <div class="score-box" id="x-score">
      <div class="label">X Wins</div>
      <div class="val" id="x-val">0</div>
    </div>
    <div class="score-box" id="draw-score">
      <div class="label">Draws</div>
      <div class="val" id="draw-val">0</div>
    </div>
    <div class="score-box" id="o-score">
      <div class="label">O Wins</div>
      <div class="val" id="o-val">0</div>
    </div>
  </div>

  <div id="status">X's turn</div>

  <div id="board">
    <div class="cell" data-i="0"></div>
    <div class="cell" data-i="1"></div>
    <div class="cell" data-i="2"></div>
    <div class="cell" data-i="3"></div>
    <div class="cell" data-i="4"></div>
    <div class="cell" data-i="5"></div>
    <div class="cell" data-i="6"></div>
    <div class="cell" data-i="7"></div>
    <div class="cell" data-i="8"></div>
  </div>

  <button id="reset">New Game</button>

  <script>
    const WINS = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    let board, current, over;
    let scores = { X: 0, O: 0, draw: 0 };

    const cells   = document.querySelectorAll('.cell');
    const status  = document.getElementById('status');
    const xVal    = document.getElementById('x-val');
    const oVal    = document.getElementById('o-val');
    const drawVal = document.getElementById('draw-val');

    function init() {
      board   = Array(9).fill('');
      current = 'X';
      over    = false;
      cells.forEach(c => {
        c.textContent = '';
        c.className   = 'cell';
      });
      status.textContent = "X's turn";
    }

    function checkWin() {
      for (const [a, b, c] of WINS) {
        if (board[a] && board[a] === board[b] && board[a] === board[c]) {
          return [a, b, c];
        }
      }
      return null;
    }

    function updateScores() {
      xVal.textContent    = scores.X;
      oVal.textContent    = scores.O;
      drawVal.textContent = scores.draw;
    }

    cells.forEach(cell => {
      cell.addEventListener('click', () => {
        const i = +cell.dataset.i;
        if (over || board[i]) return;

        board[i] = current;
        cell.textContent = current;
        cell.classList.add(current.toLowerCase(), 'taken');

        const win = checkWin();
        if (win) {
          win.forEach(idx => cells[idx].classList.add('win'));
          status.textContent = `${current} wins!`;
          scores[current]++;
          updateScores();
          over = true;
        } else if (board.every(Boolean)) {
          status.textContent = "It's a draw!";
          scores.draw++;
          updateScores();
          over = true;
        } else {
          current = current === 'X' ? 'O' : 'X';
          status.textContent = `${current}'s turn`;
        }
      });
    });

    document.getElementById('reset').addEventListener('click', init);

    init();
  </script>
</body>
</html>
